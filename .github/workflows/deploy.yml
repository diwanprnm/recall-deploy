# GitHub Actions: Build → Push to ghcr.io → Deploy to VPS
#
# Secrets required (Settings → Secrets and variables → Actions):
#   VPS_HOST     : server IP or domain (e.g. app.theonezone.my.id)
#   VPS_USER     : SSH username (e.g. root)
#   VPS_SSH_KEY  : private SSH key
#   VPS_PORT     : SSH port (optional, default: 22)
#   GHCR_TOKEN   : Fine-grained PAT with read:packages scope
#
# Registry: ghcr.io (GitHub Container Registry)
#   - Free for public repos
#   - Auth: GHCR_TOKEN (fine-grained PAT)
#
# Image tags: sha-{short_sha} (e.g. sha-abc1234)
#   ghcr.io/diwanprnm/recall-deploy/recall-web:sha-abc1234
#   ghcr.io/diwanprnm/recall-deploy/recall-api:sha-abc1234

name: CI/CD - Build, Push & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: diwanprnm
  FRONTEND_IMAGE: ghcr.io/diwanprnm/recall-deploy/recall-web
  BACKEND_IMAGE: ghcr.io/diwanprnm/recall-deploy/recall-api

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      short_sha: ${{ steps.vars.outputs.SHORT_SHA }}
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}

    steps:
      # ── 1. Checkout with submodules ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Get commit info ──
      - name: Get commit info
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="sha-${SHORT_SHA}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Commit: ${{ github.sha }} → Tag: $IMAGE_TAG"

      # ── 3. Login to ghcr.io ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── 4. Build & Push Frontend (recall-web) ──
      - name: Build and push recall-web
        working-directory: ./recall-web
        run: |
          docker build \
            --tag ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.IMAGE_TAG }} \
            --tag ${{ env.FRONTEND_IMAGE }}:latest \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=https://apirecall.theonezone.my.id \
            --provenance false \
            .

          docker push -a ${{ env.FRONTEND_IMAGE }}
          echo "✓ Frontend image pushed: ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "✓ Frontend image pushed: ${{ env.FRONTEND_IMAGE }}:latest"

      # ── 5. Build & Push Backend (recall-api) ──
      - name: Build and push recall-api
        working-directory: ./recall-api
        run: |
          docker build \
            --tag ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.IMAGE_TAG }} \
            --tag ${{ env.BACKEND_IMAGE }}:latest \
            --build-arg SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            --build-arg OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --provenance false \
            .

          docker push -a ${{ env.BACKEND_IMAGE }}
          echo "✓ Backend image pushed: ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "✓ Backend image pushed: ${{ env.BACKEND_IMAGE }}:latest"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-push

    steps:
      # ── 6. Setup SSH ──
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -H -p "${VPS_PORT:-22}" "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null
          echo "✓ VPS added to known_hosts"

      # ── 7. Deploy via SSH ──
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          REPO_OWNER: ${{ env.REPO_OWNER }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
        run: |
          set -e
          PORT="${VPS_PORT:-22}"
          echo "=========================================="
          echo "Connecting to ${VPS_USER}@${VPS_HOST}:${PORT}"
          echo "Image tag: $IMAGE_TAG"
          echo "=========================================="

          ssh -p "$PORT" \
             -o StrictHostKeyChecking=no \
             -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
             "${VPS_USER}@${VPS_HOST}" bash -s << 'DEPLOY_SCRIPT'
          set -euo pipefail

          REGISTRY="${REGISTRY}"
          REPO_OWNER="${REPO_OWNER}"
          FRONTEND_IMAGE="${FRONTEND_IMAGE}"
          BACKEND_IMAGE="${BACKEND_IMAGE}"
          IMAGE_TAG="${IMAGE_TAG}"
          GHCR_TOKEN="${GHCR_TOKEN}"

          echo ""
          echo "=========================================="
          echo "  DEPLOYMENT ON VPS"
          echo "=========================================="
          echo "Tag: $IMAGE_TAG"
          echo "User: $(whoami)"

          # ── Login to ghcr.io ──
          echo ""
          echo "▶ Logging into $REGISTRY..."
          echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$REPO_OWNER" --password-stdin
          echo "✓ Logged into $REGISTRY"

          # ── Update docker-compose.yml with new image tags ──
          echo ""
          echo "▶ Updating docker-compose.yml with new image tags..."
          cd /var/www/my-app

          # Update frontend image tag
          sed -i "s|image: my-app-frontend|image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|" docker-compose.yml
          # Update backend image tag
          sed -i "s|image: my-app-backend|image: ${BACKEND_IMAGE}:${IMAGE_TAG}|" docker-compose.yml

          echo "✓ docker-compose.yml updated"
          cat docker-compose.yml | grep -E "image:|frontend:|backend:" | head -10

          # ── Stop old containers ──
          echo ""
          echo "▶ Stopping old containers..."
          docker compose -f docker-compose.yml down --remove-orphans 2>/dev/null || true
          echo "✓ Old containers stopped"

          # ── Pull new images ──
          echo ""
          echo "▶ Pulling new images from $REGISTRY..."
          docker compose -f docker-compose.yml pull
          echo "✓ Images pulled"

          # ── Start containers ──
          echo ""
          echo "▶ Starting containers..."
          docker compose -f docker-compose.yml up -d --no-build
          echo "✓ Containers started"

          # ── Show status ──
          echo ""
          echo "▶ Container status:"
          docker compose -f docker-compose.yml ps

          echo ""
          echo "=========================================="
          echo "  DEPLOYMENT COMPLETED ✓"
          echo "=========================================="
          DEPLOY_SCRIPT

      # ── 8. Verify ──
      - name: Verify deployment
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "  SMOKE TEST"
          echo "=========================================="
          set +e

          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://recall.theonezone.my.id/" --connect-timeout 15 --max-time 30)
          echo "✓ Frontend: https://recall.theonezone.my.id/ → HTTP $FRONTEND_STATUS"

          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://apirecall.theonezone.my.id/health" --connect-timeout 15 --max-time 30 2>/dev/null || echo "000")
          echo "✓ Backend API: https://apirecall.theonezone.my.id/ → HTTP $API_STATUS"

          echo ""
          echo "=========================================="
          echo "  DONE"
          echo "=========================================="

      - name: Notify failure
        if: failure()
        run: |
          echo "=========================================="
          echo "  ❌ DEPLOYMENT FAILED"
          echo "=========================================="
          echo "Check job log above for details."