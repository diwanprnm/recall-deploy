version: '3.8'

services:
  frontend:
    image: ghcr.io/diwanprnm/recall-deploy/recall-web:latest # Updated from build:
    ports:
      - "3001:3000" # Keep same host port for Nginx
    environment:
      - NODE_ENV=production # Changed to production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - NEXT_PUBLIC_API_URL=https://apirecall.theonezone.my.id # Updated API URL
    # volumes: # Remove local dev volumes
    #   - ./recall-web:/app
    #   - ./recall-web/.next:/app/.next
    #   - /var/www/my-app/node_modules:/app/node_modules

  backend:
    image: ghcr.io/diwanprnm/recall-deploy/recall-api:latest # Updated from build:
    ports:
      - "8001:8000" # Keep same host port for Nginx
    environment:
      - ENVIRONMENT=production # Changed to production
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false # Changed to false
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ALLOWED_ORIGINS=https://recall.theonezone.my.id # Updated ALLOWED_ORIGINS
    # volumes: # Remove local dev volumes
    #   - ./recall-api:/app
    #   - ./recall-api/.env:/app/.env
    #   - /var/www/my-app/node_modules:/app/node_modules

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro # Read-only for production
      - ./nginx/ssl:/etc/nginx/ssl/:ro
    depends_on:
      - frontend
      - backend
